services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: paypulse
      POSTGRES_PASSWORD: paypulse_dev
      POSTGRES_DB: paypulse
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paypulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - config/.env.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  web:
    build: ./src/web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

  dashboard:
    build: ./src/dashboard
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

  docs:
    image: node:20-alpine
    working_dir: /docs
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - ./docs:/docs
    command: sh -c "npm install -g mintlify && mintlify dev --port 3000"

volumes:
  pgdata:
  redisdata:
